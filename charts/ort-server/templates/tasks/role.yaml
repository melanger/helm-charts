apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ortserver.fullname" . }}-tasks
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ortserver.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
      - delete
      - deletecollection
      - get
      - list
      - patch
      - update
      - watch
