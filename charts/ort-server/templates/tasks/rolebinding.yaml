apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ortserver.fullname" . }}-tasks
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ortserver.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ortserver.fullname" . }}-tasks-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "ortserver.fullname" . }}-tasks
  apiGroup: rbac.authorization.k8s.io
